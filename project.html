    <meta charset="UTF-8">

    <title>SecureWorks WA - Project View</title>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --sw-orange: #F15A29;
            --sw-blue-dark: #293C46;
            --sw-white: #FFFFFF;
            --sw-bg: #F5F5F7;
            --sw-border: #E5E5E5;
            --sw-text: #1D1D1F;
            --sw-text-sec: #86868B;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: var(--sw-bg); color: var(--sw-text); overflow: hidden; }
        .header { background: var(--sw-white); border-bottom: 1px solid var(--sw-border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .header-logo { height: 32px; width: auto; }
        .nav-tabs { display: flex; gap: 2px; background: var(--sw-bg); padding: 3px; border-radius: 8px; }
        .nav-tab { padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--sw-text-sec); text-decoration: none; transition: all 0.15s; }
        .nav-tab:hover { color: var(--sw-text); }
        .nav-tab.active { background: var(--sw-blue-dark); color: white; }
        .btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
        .btn-primary { background: var(--sw-orange); color: white; }
        .btn-secondary { background: var(--sw-bg); color: var(--sw-text); border: 1px solid var(--sw-border); }
        .viewport { width: 100%; height: calc(100vh - 60px); position: relative; }
        .viewport canvas { display: block; width: 100%; height: 100%; cursor: grab; }
        .viewport canvas:active { cursor: grabbing; }
        .view-panel { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 2px; background: rgba(255,255,255,0.95); padding: 3px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
        .view-btn { padding: 5px 14px; border: none; background: transparent; border-radius: 4px; font-size: 11px; cursor: pointer; color: var(--sw-text-sec); font-weight: 500; }
        .view-btn.active { background: var(--sw-blue-dark); color: white; }
        .info-overlay { position: absolute; top: 16px; left: 16px; background: rgba(255,255,255,0.95); border-radius: 10px; padding: 16px 20px; min-width: 200px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); z-index: 10; }
        .info-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--sw-orange); margin-bottom: 8px; }
        .info-row { font-size: 12px; color: var(--sw-text-sec); padding: 2px 0; }
        .info-row strong { color: var(--sw-text); }
        .no-data { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: var(--sw-text-sec); }
        .no-data h2 { color: var(--sw-text); margin-bottom: 8px; font-size: 18px; }
        .no-data p { font-size: 14px; line-height: 1.6; }
    </style>
</head>

<script>
var scene, camera, renderer, controls;
var patioCalc, deckCalc;

// ==================== LOAD SAVED CONFIGS ====================
function loadConfigs() {
    try { patioCalc = JSON.parse(localStorage.getItem('sw_patio_calc')); } catch(e) { patioCalc = null; }
    try { deckCalc = JSON.parse(localStorage.getItem('sw_decking_calc')); } catch(e) { deckCalc = null; }
    updateInfoPanel();
}

function updateInfoPanel() {
    var el = document.getElementById('infoPanel');
    var html = '<div class="info-title">Project Summary</div>';
    if (patioCalc) {
        var pL = (patioCalc.L || 0) / 1000;
        var pW = (patioCalc.W || 0) / 1000;
        html += '<div class="info-row"><strong>Patio:</strong> ' + pL.toFixed(1) + 'm x ' + pW.toFixed(1) + 'm</div>';
        html += '<div class="info-row">Style: ' + (patioCalc.isGable ? 'Gable' : 'Skillion') + '</div>';
    } else {
        html += '<div class="info-row" style="color:#999">No patio data — open Patio Designer first</div>';
    }
    if (deckCalc) {
        html += '<div class="info-row" style="margin-top:6px"><strong>Deck:</strong> ' + deckCalc.L.toFixed(1) + 'm x ' + deckCalc.W.toFixed(1) + 'm</div>';
        html += '<div class="info-row">Height: ' + deckCalc.H + 'mm | ' + (deckCalc.boardType || 'merbau') + '</div>';
    } else {
        html += '<div class="info-row" style="color:#999">No deck data — open Decking Designer first</div>';
    }
    el.innerHTML = html;
}

// ==================== TEXTURE HELPERS ====================
var grassTexCache = null;
function createGrassTexture() {
    if (grassTexCache) return grassTexCache;
    var c = document.createElement('canvas'); c.width = 512; c.height = 512;
    var ctx = c.getContext('2d');
    ctx.fillStyle = '#5A8A3A'; ctx.fillRect(0, 0, 512, 512);
    for (var i = 0; i < 2000; i++) {
        var bx = Math.random() * 512, by = Math.random() * 512;
        var g = 80 + Math.random() * 60;
        ctx.strokeStyle = 'rgba(' + (60 + Math.random() * 40) + ',' + g + ',' + (30 + Math.random() * 20) + ',0.4)';
        ctx.lineWidth = 1 + Math.random();
        ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx + (Math.random() - 0.5) * 6, by - 4 - Math.random() * 8); ctx.stroke();
    }
    var tex = new THREE.CanvasTexture(c);
    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(8, 8);
    grassTexCache = tex;
    return tex;
}

function createBrickTexture() {
    var c = document.createElement('canvas'); c.width = 256; c.height = 256;
    var ctx = c.getContext('2d');
    ctx.fillStyle = '#C4A882'; ctx.fillRect(0, 0, 256, 256);
    var brickH = 16, mortarW = 2;
    for (var row = 0; row < 16; row++) {
        var y = row * brickH;
        var offset = (row % 2) * 40;
        ctx.fillStyle = '#B0B0A8'; ctx.fillRect(0, y, 256, mortarW);
        for (var col = -1; col < 5; col++) {
            var x = col * 80 + offset;
            ctx.fillStyle = '#B0B0A8'; ctx.fillRect(x, y, mortarW, brickH);
            var r = 175 + Math.random() * 25, g2 = 150 + Math.random() * 25, b = 115 + Math.random() * 20;
            ctx.fillStyle = 'rgb(' + r + ',' + g2 + ',' + b + ')';
            ctx.fillRect(x + mortarW, y + mortarW, 80 - mortarW * 2, brickH - mortarW * 2);
        }
    }
    var tex = new THREE.CanvasTexture(c);
    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
    return tex;
}

function createWoodTexture(baseColor) {
    var c = document.createElement('canvas'); c.width = 256; c.height = 32;
    var ctx = c.getContext('2d');
    var r = (baseColor >> 16) & 0xFF, g = (baseColor >> 8) & 0xFF, b = baseColor & 0xFF;
    ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')'; ctx.fillRect(0, 0, 256, 32);
    for (var i = 0; i < 10; i++) {
        var gy = Math.random() * 32;
        ctx.strokeStyle = 'rgba(' + Math.max(0, r - 20) + ',' + Math.max(0, g - 15) + ',' + Math.max(0, b - 10) + ',0.3)';
        ctx.lineWidth = 0.5 + Math.random();
        ctx.beginPath(); ctx.moveTo(0, gy);
        for (var x = 0; x < 256; x += 20) ctx.lineTo(x, gy + (Math.random() - 0.5) * 3);
        ctx.stroke();
    }
    var tex = new THREE.CanvasTexture(c);
    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
    return tex;
}

// ==================== SCENE SETUP ====================
function initScene() {
    var container = document.getElementById('viewport');
    var canvas = document.getElementById('projCanvas');
    var w = container.clientWidth, h = container.clientHeight;

    scene = new THREE.Scene();

    // Sky
    (function() {
        var c = document.createElement('canvas'); c.width = 2; c.height = 512;
        var ctx = c.getContext('2d');
        var g = ctx.createLinearGradient(0, 0, 0, 512);
        g.addColorStop(0.0, '#3A6FB8'); g.addColorStop(0.3, '#6AA0D0'); g.addColorStop(0.5, '#95C4E0');
        g.addColorStop(0.65, '#C0D8E8'); g.addColorStop(0.8, '#DEEADC'); g.addColorStop(0.9, '#6B8F50'); g.addColorStop(1.0, '#558A38');
        ctx.fillStyle = g; ctx.fillRect(0, 0, 2, 512);
        scene.background = new THREE.CanvasTexture(c);
    })();

    camera = new THREE.PerspectiveCamera(35, w / h, 0.1, 200);
    // Camera will be positioned after scene is built

    renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ReinhardToneMapping;
    renderer.toneMappingExposure = 1.2;

    // PBR env
    var pmrem = new THREE.PMREMGenerator(renderer);
    pmrem.compileEquirectangularShader();
    var envScene = new THREE.Scene(); envScene.background = new THREE.Color(0xB8C8D8);
    var gp = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshBasicMaterial({color: 0xD4C4A8}));
    gp.rotation.x = -Math.PI / 2; gp.position.y = -1; envScene.add(gp);
    scene.environment = pmrem.fromScene(envScene, 0.04).texture;
    pmrem.dispose();

    // Lights
    scene.add(new THREE.HemisphereLight(0xE8D8C0, 0x7B9450, 0.55));
    var sun = new THREE.DirectionalLight(0xFFF0D0, 1.0);
    sun.position.set(6, 8, 5); sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048); sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 50;
    sun.shadow.camera.left = -20; sun.shadow.camera.right = 20; sun.shadow.camera.top = 20; sun.shadow.camera.bottom = -20;
    sun.shadow.bias = -0.0005; sun.shadow.normalBias = 0.02;
    scene.add(sun);
    scene.add(new THREE.DirectionalLight(0xFFF0E0, 0.25).position.set(-3, 2, -3));
    scene.fog = new THREE.Fog(0xD8DDD4, 55, 130);

    // Ground
    var grassTex = createGrassTexture();
    var lawn = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshStandardMaterial({map: grassTex, roughness: 0.92}));
    lawn.rotation.x = -Math.PI / 2; lawn.position.y = -0.01; lawn.receiveShadow = true; scene.add(lawn);
    var shadowGround = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.ShadowMaterial({opacity: 0.15}));
    shadowGround.rotation.x = -Math.PI / 2; shadowGround.receiveShadow = true; scene.add(shadowGround);

    // Controls
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; controls.dampingFactor = 0.08;

    buildEnvironment();
    if (deckCalc) buildDeck();
    if (patioCalc) buildPatio();

    // Dynamic camera based on scene content
    var maxZ = 6, maxH = 3;
    if (deckCalc) { maxZ = Math.max(maxZ, deckCalc.W + 2); maxH = Math.max(maxH, (deckCalc.H || 400) / 1000 + 1); }
    if (patioCalc) { maxZ = Math.max(maxZ, (patioCalc.W || 4000) / 1000 + 2); maxH = Math.max(maxH, (patioCalc.postH || patioCalc.postHeight || 2700) / 1000 + 1); }
    var dist = Math.max(maxZ * 1.5, 10);
    camera.position.set(dist * 0.75, maxH * 1.8, dist);
    controls.target.set(0, maxH * 0.4, maxZ * 0.35);

    animate();
    window.addEventListener('resize', function() {
        var w2 = container.clientWidth, h2 = container.clientHeight;
        camera.aspect = w2 / h2; camera.updateProjectionMatrix();
        renderer.setSize(w2, h2);
    });
}

// ==================== ENVIRONMENT ====================
function buildEnvironment() {
    var HWZ = -0.1, HW = 14, HD = 6, WH = 2.8;
    var deckH = deckCalc ? deckCalc.H / 1000 : 0;
    var isWall = deckCalc ? deckCalc.attachment === 'wall' : false;
    var floorY = isWall ? deckH : 0;
    var eaveY = floorY + WH;

    var brickTex = createBrickTexture(); brickTex.repeat.set(4, 1.5);
    var brickMat = new THREE.MeshStandardMaterial({map: brickTex, roughness: 0.85});
    var wallMat = new THREE.MeshStandardMaterial({color: 0xC8B89A, roughness: 0.85});
    var roofMat = new THREE.MeshStandardMaterial({color: 0x5A5A55, roughness: 0.5, metalness: 0.1});
    var glassMat = new THREE.MeshStandardMaterial({color: 0x88BBDD, roughness: 0.1, metalness: 0.1, transparent: true, opacity: 0.35});
    var frameMat = new THREE.MeshStandardMaterial({color: 0x444444, roughness: 0.3, metalness: 0.2});
    var fasciaMat = new THREE.MeshStandardMaterial({color: 0xE8E0D4, roughness: 0.7});
    var concreteMat = new THREE.MeshStandardMaterial({color: 0xBFB5A0, roughness: 0.82});
    var fenceMat = new THREE.MeshStandardMaterial({color: 0x888888, roughness: 0.5, metalness: 0.1});

    var doorW = 2.4, doorH = 2.2;
    var sideW = (HW - doorW) / 2;

    // Front wall
    var fwL = new THREE.Mesh(new THREE.BoxGeometry(sideW, eaveY, 0.2), brickMat);
    fwL.position.set(-(doorW / 2 + sideW / 2), eaveY / 2, HWZ); fwL.castShadow = true; scene.add(fwL);
    var fwR = new THREE.Mesh(new THREE.BoxGeometry(sideW, eaveY, 0.2), brickMat);
    fwR.position.set(doorW / 2 + sideW / 2, eaveY / 2, HWZ); fwR.castShadow = true; scene.add(fwR);
    if (floorY > 0.02) {
        var infill = new THREE.Mesh(new THREE.BoxGeometry(doorW + 0.1, floorY, 0.2), brickMat);
        infill.position.set(0, floorY / 2, HWZ); scene.add(infill);
    }
    var doorTopY = floorY + doorH;
    var lintelH = eaveY - doorTopY;
    if (lintelH > 0.01) {
        var lintel = new THREE.Mesh(new THREE.BoxGeometry(doorW + 0.1, lintelH, 0.2), brickMat);
        lintel.position.set(0, doorTopY + lintelH / 2, HWZ); scene.add(lintel);
    }

    // Back + side walls
    var bw = new THREE.Mesh(new THREE.BoxGeometry(HW, eaveY, 0.2), wallMat);
    bw.position.set(0, eaveY / 2, HWZ - HD); scene.add(bw);
    var lw = new THREE.Mesh(new THREE.BoxGeometry(0.2, eaveY, HD), wallMat);
    lw.position.set(-HW / 2, eaveY / 2, HWZ - HD / 2); scene.add(lw);
    var rw = new THREE.Mesh(new THREE.BoxGeometry(0.2, eaveY, HD), wallMat);
    rw.position.set(HW / 2, eaveY / 2, HWZ - HD / 2); scene.add(rw);

    // Roof
    var roofOH = 0.5;
    var roof = new THREE.Mesh(new THREE.BoxGeometry(HW + roofOH * 2, 0.08, HD + roofOH * 2), roofMat);
    roof.position.set(0, eaveY + 0.04, HWZ - HD / 2); roof.castShadow = true; scene.add(roof);
    var fsc = new THREE.Mesh(new THREE.BoxGeometry(HW + roofOH * 2, 0.18, 0.03), fasciaMat);
    fsc.position.set(0, eaveY - 0.05, HWZ + roofOH); scene.add(fsc);

    // Door
    var doorCY = floorY + doorH / 2;
    var dpW = (doorW - 0.06) / 2;
    scene.add(new THREE.Mesh(new THREE.BoxGeometry(dpW, doorH - 0.06, 0.03), glassMat).translateX(-dpW / 2 - 0.015).translateY(doorCY).translateZ(HWZ + 0.02));
    scene.add(new THREE.Mesh(new THREE.BoxGeometry(dpW, doorH - 0.06, 0.03), glassMat).translateX(dpW / 2 + 0.015).translateY(doorCY).translateZ(HWZ + 0.02));
    scene.add(new THREE.Mesh(new THREE.BoxGeometry(doorW + 0.06, 0.05, 0.05), frameMat).translateY(floorY + doorH + 0.025).translateZ(HWZ + 0.02));
    scene.add(new THREE.Mesh(new THREE.BoxGeometry(doorW + 0.06, 0.03, 0.05), frameMat).translateY(floorY + 0.015).translateZ(HWZ + 0.02));

    // Fences
    [[[-10, -2], [-10, 20]], [[10, -2], [10, 20]], [[-10, 20], [10, 20]]].forEach(function(f) {
        var dx = f[1][0] - f[0][0], dz = f[1][1] - f[0][1];
        var len = Math.sqrt(dx * dx + dz * dz);
        var panel = new THREE.Mesh(new THREE.BoxGeometry(len, 1.8, 0.04), fenceMat);
        panel.position.set((f[0][0] + f[1][0]) / 2, 0.9, (f[0][1] + f[1][1]) / 2);
        if (dx !== 0) panel.rotation.y = 0;
        else panel.rotation.y = Math.PI / 2;
        panel.castShadow = true; scene.add(panel);
    });

    // Concrete path
    var path = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 8), concreteMat);
    path.rotation.x = -Math.PI / 2; path.position.set(5.5, -0.003, 8); path.receiveShadow = true; scene.add(path);
}

// ==================== BUILD DECK ====================
function buildDeck() {
    var c = deckCalc;
    if (!c || !c.L) return;
    var L = c.L, W = c.W, H = (c.H || 400) / 1000;
    var isWall = c.attachment === 'wall';
    var ox = -L / 2, oz = isWall ? 0 : 2;
    var deckTop = H;
    var bw = c.boardW / 1000, bh = c.boardH / 1000;

    // Board colour from type
    var BOARD_COLORS = {merbau: 0x6B3A2A, spotted_gum: 0x8B6B4F, blackbutt: 0xA08860, jarrah: 0x5C2E1A, treated_pine: 0xC4A86A, composite: 0x7A6A5A};
    var boardColor = BOARD_COLORS[c.boardType] || 0x6B3A2A;
    var woodTex = createWoodTexture(boardColor);
    var boardMat = new THREE.MeshStandardMaterial({map: woodTex, roughness: 0.75});
    var frameMat = new THREE.MeshStandardMaterial({color: 0xD4BE8A, roughness: 0.65});
    var postMat = new THREE.MeshStandardMaterial({color: 0x555555, roughness: 0.35, metalness: 0.6});
    var gap = 0.005;

    var group = new THREE.Group();
    scene.add(group);

    // Posts
    var postDim = 0.075;
    for (var pi = 0; pi < c.bearerCount; pi++) {
        var px = ox + (pi / (c.bearerCount - 1)) * L;
        var post = new THREE.Mesh(new THREE.BoxGeometry(postDim, H, postDim), postMat);
        post.position.set(px, H / 2, oz + W); post.castShadow = true; group.add(post);
        if (!isWall) {
            var p2 = new THREE.Mesh(new THREE.BoxGeometry(postDim, H, postDim), postMat);
            p2.position.set(px, H / 2, oz); p2.castShadow = true; group.add(p2);
        }
    }

    // Bearers
    for (var bi = 0; bi < c.bearerCount; bi++) {
        var bx = ox + (bi / (c.bearerCount - 1)) * L;
        var bearer = new THREE.Mesh(new THREE.BoxGeometry(0.045, 0.19, W), frameMat);
        bearer.position.set(bx, H - 0.095, oz + W / 2); group.add(bearer);
    }

    // Joists
    for (var ji = 0; ji < c.joistCount; ji++) {
        var jz = oz + (ji / (c.joistCount - 1)) * W;
        var joist = new THREE.Mesh(new THREE.BoxGeometry(L, 0.045, 0.14), frameMat);
        joist.position.set(0, H - 0.19 + 0.0225, jz); group.add(joist);
    }

    // Deck boards
    for (var di = 0; di < 999; di++) {
        var dz = oz + di * (bw + gap);
        if (dz > oz + W) break;
        var bd = new THREE.Mesh(new THREE.BoxGeometry(L, bh, bw), boardMat);
        bd.position.set(0, deckTop + bh / 2, dz + bw / 2);
        bd.castShadow = true; bd.receiveShadow = true; group.add(bd);
    }

    // Skirting
    if (H > 0.05) {
        var postHalf = postDim / 2 + 0.005;
        var skirtRows = Math.ceil(deckTop / bw) + 1;
        function addSkirt(len, px, pz, axis) {
            for (var sr = 0; sr < skirtRows; sr++) {
                var sy = deckTop - sr * bw - bw / 2;
                if (sy < -0.05) break;
                var geo = axis === 'x' ? new THREE.BoxGeometry(len, bw, bh) : new THREE.BoxGeometry(bh, bw, len);
                var m = new THREE.Mesh(geo, boardMat);
                m.position.set(px, sy, pz); m.castShadow = true; group.add(m);
            }
        }
        addSkirt(L + postHalf * 2, 0, oz + W + postHalf, 'x');
        addSkirt(W + postHalf * 2, ox - postHalf, oz + W / 2, 'z');
        addSkirt(W + postHalf * 2, ox + L + postHalf, oz + W / 2, 'z');
        if (!isWall) addSkirt(L + postHalf * 2, 0, oz - postHalf, 'x');
    }
}

// ==================== BUILD PATIO ====================
function buildPatio() {
    var c = patioCalc;
    if (!c) return;
    var L = (c.L || 6000) / 1000;
    var W = (c.W || 4000) / 1000;
    var isGable = !!c.isGable;
    var pitch = (c.userPitch || c.pitch || 5) * Math.PI / 180;

    // Patio position: attached to house wall
    var patioOx = -L / 2;
    var patioOz = 0;  // starts at house wall

    var postH = (c.postH || c.postHeight || 2700) / 1000;
    var frontH = isGable ? postH : postH - W * Math.tan(pitch);
    var backH = postH;

    var steelMat = new THREE.MeshStandardMaterial({color: 0x666666, roughness: 0.35, metalness: 0.6});
    var roofMat = new THREE.MeshStandardMaterial({color: 0x888888, roughness: 0.4, metalness: 0.3, side: THREE.DoubleSide});

    var group = new THREE.Group();
    scene.add(group);

    // Posts (front corners + intermediates)
    var postCount = Math.max(2, c.nPosts || c.nPost || 2);
    for (var pi = 0; pi < postCount; pi++) {
        var px = patioOx + (pi / (postCount - 1)) * L;
        var pH = frontH;
        var post = new THREE.Mesh(new THREE.BoxGeometry(0.09, pH, 0.09), steelMat);
        post.position.set(px, pH / 2, patioOz + W); post.castShadow = true; group.add(post);
    }

    // Front beam
    var frontBeam = new THREE.Mesh(new THREE.BoxGeometry(L, 0.08, 0.05), steelMat);
    frontBeam.position.set(0, frontH, patioOz + W); frontBeam.castShadow = true; group.add(frontBeam);

    // Back beam (at house wall)
    var backBeam = new THREE.Mesh(new THREE.BoxGeometry(L, 0.08, 0.05), steelMat);
    backBeam.position.set(0, backH, patioOz); group.add(backBeam);

    // Roof
    if (isGable) {
        var rise = (W / 2) * Math.tan(pitch);
        var rafter = Math.sqrt(Math.pow(W / 2, 2) + rise * rise);
        var apexH = postH + rise;

        // Back slope (house side → ridge)
        var backGeo = new THREE.PlaneGeometry(L, rafter);
        var backRoof = new THREE.Mesh(backGeo, roofMat);
        backRoof.position.set(0, postH + rise / 2, patioOz + W / 4);
        backRoof.rotation.x = -Math.PI / 2 + pitch;
        backRoof.castShadow = true; backRoof.receiveShadow = true; group.add(backRoof);

        // Front slope (ridge → front edge)
        var frontGeo = new THREE.PlaneGeometry(L, rafter);
        var frontRoof = new THREE.Mesh(frontGeo, roofMat);
        frontRoof.position.set(0, postH + rise / 2, patioOz + W * 3 / 4);
        frontRoof.rotation.x = -Math.PI / 2 - pitch;
        frontRoof.castShadow = true; frontRoof.receiveShadow = true; group.add(frontRoof);

        // Ridge beam
        var ridge = new THREE.Mesh(new THREE.BoxGeometry(L + 0.2, 0.06, 0.04), steelMat);
        ridge.position.set(0, apexH, patioOz + W / 2); group.add(ridge);
    } else {
        // Skillion — single slope from back (high) to front (low)
        var roofLen = Math.sqrt(W * W + Math.pow(backH - frontH, 2));
        var roofGeo = new THREE.PlaneGeometry(L, roofLen);
        var roofMesh = new THREE.Mesh(roofGeo, roofMat);
        var midH = (backH + frontH) / 2;
        roofMesh.position.set(0, midH, patioOz + W / 2);
        roofMesh.rotation.x = -Math.PI / 2 + Math.atan2(backH - frontH, W);
        roofMesh.castShadow = true; roofMesh.receiveShadow = true; group.add(roofMesh);
    }

    // Rafters/trusses
    var nTruss = c.nTruss || 4;
    for (var ti = 0; ti < nTruss; ti++) {
        var tx = patioOx + (ti / (nTruss - 1)) * L;
        var rBeam = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.06, W), steelMat);
        var rMidH = (backH + frontH) / 2;
        rBeam.position.set(tx, rMidH - 0.05, patioOz + W / 2);
        if (!isGable) {
            rBeam.rotation.x = Math.atan2(backH - frontH, W);
        }
        group.add(rBeam);
    }

    // Gutter
    var gutterMat = new THREE.MeshStandardMaterial({color: 0x999999, roughness: 0.4, metalness: 0.3});
    var gutter = new THREE.Mesh(new THREE.BoxGeometry(L, 0.06, 0.08), gutterMat);
    gutter.position.set(0, frontH - 0.03, patioOz + W + 0.04); group.add(gutter);
}

// ==================== VIEW CONTROLS ====================
function setView(view, btn) {
    document.querySelectorAll('.view-btn').forEach(function(b) { b.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    var maxZ = 6, maxH = 3;
    if (deckCalc) { maxZ = Math.max(maxZ, deckCalc.W + 2); maxH = Math.max(maxH, (deckCalc.H || 400) / 1000 + 1); }
    if (patioCalc) { maxZ = Math.max(maxZ, (patioCalc.W || 4000) / 1000 + 2); maxH = Math.max(maxH, (patioCalc.postH || patioCalc.postHeight || 2700) / 1000 + 1); }
    var dist = Math.max(maxZ * 1.5, 10);
    var target = new THREE.Vector3(0, maxH * 0.4, maxZ * 0.35);
    switch(view) {
        case 'front': camera.position.set(0, maxH * 0.8, dist * 1.2); break;
        case 'side': camera.position.set(dist, maxH * 0.8, maxZ * 0.35); break;
        case 'top': camera.position.set(0, dist * 1.2, maxZ * 0.35); break;
        case 'bird': camera.position.set(dist * 0.9, dist * 0.7, dist * 0.9); break;
        default: camera.position.set(dist * 0.75, maxH * 1.8, dist); break;
    }
    controls.target.copy(target); controls.update();
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

// ==================== INIT ====================
loadConfigs();
initScene();
</script>
</body>
</html>
